<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexum Bank — Cadastro</title>
    <link rel="stylesheet" href="cadastro.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <header>
        <a href="index.html" class="logo">Nexum<span> Bank</span></a>
    </header>
    <main>
        <div class="formulario-container">
            <h2>Abra sua conta</h2>
            <p class="subtitulo">Preencha os dados abaixo para começar</p>

            <form id="formCadastro">
                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Ex: João da Silva" />
                    <span class="erro" id="erro-nome"></span>
                </div>
                <div class="campo">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" placeholder="Ex: 25" min="0" max="120" />
                    <span class="erro" id="erro-idade"></span>
                </div>
                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
                    <span class="erro" id="erro-cpf"></span>
                </div>
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" />
                    <span class="erro" id="erro-email"></span>
                </div>
                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
                    <span class="erro" id="erro-telefone"></span>
                </div>
                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
                    <span class="erro" id="erro-senha"></span>
                </div>
                <div class="campo">
                    <label for="confirmarSenha">Confirmar senha</label>
                    <input type="password" id="confirmarSenha" placeholder="Repita sua senha" />
                    <span class="erro" id="erro-confirmarSenha"></span>
                </div>

                <button type="submit" class="btn-enviar">Criar minha conta</button>
            </form>

            <div class="sucesso" id="mensagem-sucesso">
                ✓ Cadastro realizado com sucesso! Bem-vindo ao Nexum Bank.
            </div>

            <p class="link-voltar">Já tem conta? <a href="#">Faça login</a></p>
        </div>
    </main>

    <script src="../js/cadastro.js"></script>
</body>

</html>
